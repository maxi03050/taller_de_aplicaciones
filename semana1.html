<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Semana 1 - Planificación</title>

  <style>
    /* ================================
       🎨 ESTILOS GENERALES
       ================================ */
    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #3498db, #2c3e50);
      color: #2c3e50;
    }

    /* Nombre del usuario (Admin o Invitado) arriba a la derecha */
    .user-name {
      position: absolute;
      top: 15px;
      right: 20px;
      font-weight: 600;
      background: rgba(255,255,255,0.8);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    /* Contenedor principal de la semana */
    .semana-container {
      max-width: 900px;
      margin: 70px auto;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.7s ease;
      color: #fff;
    }

    /* Animación de entrada */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Título y descripción */
    .semana-header h1 {
      margin: 0;
      font-size: 30px;
      color: #fff;
    }

    .semana-header p {
      color: #f0f0f0;
      margin-bottom: 25px;
    }

    /* Botón para volver a la lista de tareas */
    .back-button {
      text-decoration: none;
      color: #ffeb3b;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 20px;
      transition: color 0.3s;
    }
    .back-button:hover { color: #ffc107; }

    /* ================================
       📁 ESTILOS DE SUBIDA Y BOTONES
       ================================ */
    .file-input-button {
      background: #1976d2;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      display: inline-block;
      transition: background 0.3s;
    }
    .file-input-button:hover { background: #125ea5; }

    input[type="file"] { display: none; } /* Oculta el input real */

    button {
      border: none;
      padding: 10px 20px;
      font-size: 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
      color: #fff;
    }

    /* Estilos de botones */
    .upload-btn { background: #27ae60; }
    .upload-btn:hover { background: #1f8a4d; }

    .delete-btn { background: #e74c3c; }
    .delete-btn:hover { background: #c0392b; }

    .download-btn {
      background: #8e44ad;
      text-decoration: none;
      display: inline-block;
      padding: 8px 15px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      color: #fff;
    }
    .download-btn:hover { background: #6c3483; }

    #status {
      font-weight: 500;
      margin-top: 10px;
    }

    /* ================================
       🗂️ LISTA DE ARCHIVOS
       ================================ */
    .work-list {
      border-top: 2px solid rgba(255,255,255,0.2);
      padding-top: 20px;
      margin-top: 25px;
    }

    /* Tarjeta de cada archivo */
    .file-card {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      gap: 15px;
    }

    /* Imagen de vista previa */
    .preview-image {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: #f9f9f9;
    }

    /* Información del archivo */
    .file-info { flex: 1; }

    .file-name {
      font-weight: bold;
      font-size: 16px;
      color: #fff;
    }

    .file-size {
      font-size: 13px;
      color: #ddd;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
    }

    /* Texto del archivo seleccionado */
    #selectedFile {
      margin-top: 8px;
      font-size: 14px;
      color: #ffeb3b;
      font-style: italic;
    }

    /* ================================
       🌐 ENLACE A GITHUB
       ================================ */
    .github-link {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #24292e;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }
    .github-link:hover {
      background: #0366d6;
    }
  </style>
</head>

<body>
  <!-- Muestra el nombre del usuario (Administrador o Invitado) -->
  <div class="user-name" id="userName">Cargando...</div>

  <!-- Contenedor principal -->
  <div class="semana-container">
    <div class="semana-header">
      <!-- Botón de retorno -->
      <a href="tareas.html" class="back-button">← Volver a Tareas</a>

      <!-- Título y descripción -->
      <h1>📝 Semana 1 - Planificación</h1>
      <p>Sube y gestiona tu trabajo de esta semana</p>

      <!-- Enlace directo al repositorio de GitHub -->
      <a href="https://github.com/maxi03050/taller_de_aplicaciones/tree/main/tareas/semana%201"
         target="_blank"
         class="github-link">
         🌐 Ver carpeta en GitHub
      </a>
    </div>

    <!-- ===========================
         📤 SECCIÓN DE SUBIDA DE ARCHIVOS (solo Admin)
         =========================== -->
    <div class="upload-section" id="uploadSection">
      <h2>Subir Trabajo</h2>
      <form class="upload-form" id="uploadForm">
        <div class="file-input-wrapper">
          <label class="file-input-button">
            📁 Seleccionar Archivo
            <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.ppt,.pptx" />
          </label>
          <div id="selectedFile">Ningún archivo seleccionado</div>
        </div>
        <button type="button" class="upload-btn" onclick="subirArchivo()">📤 Subir Trabajo</button>
      </form>
      <p id="status"></p>
    </div>

    <!-- ===========================
         📂 LISTA DE ARCHIVOS SUBIDOS
         =========================== -->
    <div class="work-list" id="workList">
      <h2>📂 Archivos Subidos</h2>
      <div id="fileCards"></div>
    </div>
  </div>

  <!-- ===========================
       🔧 SCRIPT JAVASCRIPT (Módulo con Supabase)
       =========================== -->
  <script type="module">
    /* Importamos la librería oficial de Supabase */
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    /* Creamos la conexión a Supabase */
    const supabase = createClient(
      "https://sxxayzbfdrxxfrltdirb.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4eGF5emJmZHJ4eGZybHRkaXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg4Mzk2OTMsImV4cCI6MjA3NDQxNTY5M30.xi675-BzW7SQUFhD_5QN0-lLNsnQyF2_FU6lYXB9fqw"
    );

    /* Variables globales */
    let archivos = []; // Lista de archivos
    const esAdmin = localStorage.getItem("isAdmin") === "true"; // Control de rol

    /* Mostrar nombre según tipo de usuario */
    const userNameDiv = document.getElementById("userName");
    userNameDiv.textContent = esAdmin ? "Administrador" : "Invitado";

    /* Si no es admin, se oculta la sección de subida */
    if (!esAdmin) {
      document.getElementById("uploadSection").style.display = "none";
    }

    /* Cuando se selecciona un archivo, se muestra su nombre */
    document.getElementById("fileInput")?.addEventListener("change", (e) => {
      const selectedFile = document.getElementById("selectedFile");
      selectedFile.textContent = e.target.files.length
        ? `📄 ${e.target.files[0].name}`
        : "Ningún archivo seleccionado";
    });

    /* ==============================
       📤 FUNCIÓN PARA SUBIR ARCHIVO
       ============================== */
    async function subirArchivo() {
      if (!esAdmin) return alert("⚠️ Solo el administrador puede subir archivos");

      const fileInput = document.getElementById("fileInput");
      const status = document.getElementById("status");

      if (!fileInput.files.length) {
        alert("⚠️ Selecciona un archivo primero");
        return;
      }

      const file = fileInput.files[0];
      const filePath = `entregas/${Date.now()}-${file.name}`; // Ruta única

      status.textContent = "⏳ Subiendo...";

      // Subir archivo al bucket "trabajos"
      const { error: uploadError } = await supabase.storage
        .from("trabajos")
        .upload(filePath, file);

      if (uploadError) {
        status.textContent = "❌ Error: " + uploadError.message;
        return;
      }

      // Obtener URL pública del archivo
      const { data: publicURL } = supabase.storage
        .from("trabajos")
        .getPublicUrl(filePath);

      // Guardar metadatos del archivo en la tabla "archivos"
      const { error: dbError } = await supabase
        .from("archivos")
        .insert([{ 
          nombre: file.name, 
          ruta: filePath, 
          url: publicURL.publicUrl, 
          semana: "Semana 1" 
        }]);

      if (dbError) {
        status.textContent = "❌ Error guardando en base de datos";
        return;
      }

      // Éxito ✅
      status.textContent = "✅ Archivo subido correctamente";
      fileInput.value = "";
      document.getElementById("selectedFile").textContent = "Ningún archivo seleccionado";

      // Recargar lista
      cargarArchivos();
    }

    /* ==============================
       📥 CARGAR ARCHIVOS EXISTENTES
       ============================== */
    async function cargarArchivos() {
      const { data } = await supabase
        .from("archivos")
        .select("*")
        .eq("semana", "Semana 1")
        .order("subido_en", { ascending: false });

      archivos = data || [];
      mostrarArchivos();
    }

    /* ==============================
       🖼️ MOSTRAR ARCHIVOS EN PANTALLA
       ============================== */
    function mostrarArchivos() {
      const container = document.getElementById("fileCards");
      container.innerHTML = "";

      archivos.forEach((archivo) => {
        const div = document.createElement("div");
        div.className = "file-card";

        // Imagen de vista previa
        const img = document.createElement("img");
        img.className = "preview-image";
        img.src = archivo.url.match(/\.(jpg|jpeg|png)$/i)
          ? archivo.url
          : "https://cdn-icons-png.flaticon.com/512/109/109612.png"; // Icono genérico

        // Información del archivo
        const info = document.createElement("div");
        info.className = "file-info";
        info.innerHTML = `
          <div class="file-name">${archivo.nombre}</div>
          <div class="file-size">${archivo.size ? (archivo.size/1024).toFixed(2)+" KB" : ""}</div>
        `;

        // Botones de acción
        const buttons = document.createElement("div");
        buttons.className = "action-buttons";

        // Botón de descarga
        const download = document.createElement("a");
        download.className = "download-btn";
        download.href = archivo.url;
        download.target = "_blank";
        download.textContent = "⬇️ Descargar";
        buttons.appendChild(download);

        // Botón de eliminar (solo para admin)
        if (esAdmin) {
          const del = document.createElement("button");
          del.className = "delete-btn";
          del.textContent = "🗑️ Borrar";
          del.onclick = async () => {
            if (!confirm("⚠️ ¿Seguro que deseas eliminar este archivo?")) return;
            await supabase.storage.from("trabajos").remove([archivo.ruta]);
            await supabase.from("archivos").delete().eq("id", archivo.id);
            cargarArchivos();
            document.getElementById("status").textContent = "✅ Archivo eliminado correctamente";
          };
          buttons.appendChild(del);
        }

        // Añadir todo al contenedor
        div.appendChild(img);
        div.appendChild(info);
        div.appendChild(buttons);
        container.appendChild(div);
      });
    }

    /* Ejecutar la carga inicial de archivos al cargar la página */
    document.addEventListener("DOMContentLoaded", cargarArchivos);
    /* Hacer accesible la función subirArchivo al botón */
    window.subirArchivo = subirArchivo;
  </script>
</body>
</html>
